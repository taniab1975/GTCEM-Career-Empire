<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Empire Promo Video</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.18), transparent 26%),
        linear-gradient(180deg, #06101f, #0b172b 60%, #08111f);
      color: #e5eefc;
    }
    .promo-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 14px;
    }
    .promo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .promo-header h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2.2vw, 2.4rem);
      line-height: 1.05;
    }
    .promo-header p {
      margin: 6px 0 0 0;
      color: #cbd5e1;
      max-width: 860px;
      line-height: 1.5;
      font-size: 0.98rem;
    }
    .promo-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .promo-close,
    .promo-fullscreen {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(15, 23, 42, 0.84);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .promo-fullscreen {
      background: linear-gradient(135deg, #60a5fa, #2563eb);
      border: none;
      box-shadow: 0 16px 36px rgba(37, 99, 235, 0.28);
    }
    .promo-video-frame {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border-radius: 24px;
      border: 1px solid rgba(125, 211, 252, 0.2);
      background: rgba(15, 23, 42, 0.74);
      box-shadow: 0 30px 80px rgba(2, 6, 23, 0.45);
    }
    .promo-video-frame video {
      width: 100%;
      max-width: none;
      height: calc(100vh - 140px);
      max-height: calc(100vh - 140px);
      border-radius: 16px;
      background: #000;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    @media (max-width: 720px) {
      .promo-shell {
        padding: 10px;
      }
      .promo-video-frame {
        padding: 8px;
      }
      .promo-video-frame video {
        height: calc(100vh - 170px);
        max-height: calc(100vh - 170px);
      }
    }
  </style>
</head>
<body>
  <main class="promo-shell">
    <header class="promo-header">
      <div>
        <h1>What is Career Empire?</h1>
        <p>Watch the full promo walkthrough to see how students learn, earn, compete, contribute to their class community, and build their career journey through the curriculum.</p>
      </div>
      <div class="promo-actions">
        <button type="button" class="promo-fullscreen" id="promo-fullscreen-btn">Full Screen</button>
        <a class="promo-close" href="./index.html">Back to Homepage</a>
      </div>
    </header>
    <section class="promo-video-frame">
      <video controls playsinline preload="metadata" autoplay id="promo-video">
        <source src="./Assets/videos/Career%20Empire%20Final.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </section>
  </main>
  <script>
    (function () {
      const video = document.getElementById("promo-video");
      const fullscreenButton = document.getElementById("promo-fullscreen-btn");
      if (!video || !fullscreenButton) return;

      fullscreenButton.addEventListener("click", async () => {
        try {
          if (video.requestFullscreen) {
            await video.requestFullscreen();
          } else if (video.webkitEnterFullscreen) {
            video.webkitEnterFullscreen();
          }
        } catch (_) {
          // Ignore browser fullscreen failures and leave the large inline player visible.
        }
      });
    }());
  </script>
</body>
</html>
