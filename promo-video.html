<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Empire Promo Video</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Outfit", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.18), transparent 26%),
        linear-gradient(180deg, #06101f, #0b172b 60%, #08111f);
      color: #e5eefc;
    }
    .promo-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 24px;
    }
    .promo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .promo-header h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1.05;
    }
    .promo-header p {
      margin: 8px 0 0 0;
      color: #cbd5e1;
      max-width: 760px;
      line-height: 1.6;
    }
    .promo-close {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(15, 23, 42, 0.84);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
    .promo-video-frame {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      border-radius: 28px;
      border: 1px solid rgba(125, 211, 252, 0.2);
      background: rgba(15, 23, 42, 0.74);
      box-shadow: 0 30px 80px rgba(2, 6, 23, 0.45);
    }
    .promo-video-frame video {
      width: 100%;
      max-width: 1280px;
      max-height: 78vh;
      border-radius: 18px;
      background: #000;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    @media (max-width: 720px) {
      .promo-shell {
        padding: 16px;
      }
      .promo-video-frame {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="promo-shell">
    <header class="promo-header">
      <div>
        <h1>What is Career Empire?</h1>
        <p>Watch the full promo walkthrough to see how students learn, earn, compete, contribute to their class community, and build their career journey through the curriculum.</p>
      </div>
      <a class="promo-close" href="./index.html">Back to Homepage</a>
    </header>
    <section class="promo-video-frame">
      <video controls playsinline preload="metadata" autoplay>
        <source src="./Assets/videos/90%20sec%20video.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </section>
  </main>
</body>
</html>
