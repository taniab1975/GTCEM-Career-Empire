<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Community impact radar</title>
  <desc id="desc">A glowing class fund hub connecting climate, technology, equity, and global opportunity signals.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#183a63"/>
      <stop offset=".52" stop-color="#0b2038"/>
      <stop offset="1" stop-color="#07111f"/>
    </radialGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#80ed99"/>
      <stop offset="1" stop-color="#38d5c8"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#68d2ff"/>
      <stop offset="1" stop-color="#7aa4ff"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#ff9f1c"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7b72"/>
      <stop offset="1" stop-color="#f7a5ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.407 0 0 0 0 0.823 0 0 0 0 1 0 0 0 .8 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity=".48"/>
    </filter>
  </defs>
  <rect width="900" height="620" rx="44" fill="url(#bg)"/>
  <g opacity=".45" fill="none" stroke="#88adff" stroke-width="1.4">
    <circle cx="450" cy="314" r="238"/>
    <circle cx="450" cy="314" r="170"/>
    <circle cx="450" cy="314" r="96"/>
    <path d="M450 74v480M210 314h480M281 145l338 338M619 145 281 483"/>
  </g>
  <g fill="none" stroke-linecap="round" stroke-width="10" opacity=".9">
    <path d="M450 314 286 166" stroke="url(#green)"/>
