<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Glossary recall forge</title>
  <desc id="desc">A bright memory core with connected glossary nodes.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="54%" r="74%">
      <stop offset="0" stop-color="#173c50"/>
      <stop offset=".52" stop-color="#0b1937"/>
      <stop offset="1" stop-color="#050815"/>
    </radialGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd86c"/>
      <stop offset=".48" stop-color="#72f7b8"/>
      <stop offset="1" stop-color="#62f0ff"/>
    </linearGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="420" rx="42" fill="url(#bg)"/>
  <g stroke="#62f0ff" stroke-width="2" opacity=".34">
    <path d="M320 208L170 126M320 208l302-4M320 208L172 306M320 208l142 92"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="320" cy="208" r="74" fill="none" stroke="url(#core)" stroke-width="8"/>
    <circle cx="320" cy="208" r="34" fill="url(#core)"/>
    <circle cx="170" cy="126" r="32" fill="#0f2b58" stroke="#62f0ff" stroke-width="4"/>
    <circle cx="470" cy="126" r="32" fill="#0f2b58" stroke="#72f7b8" stroke-width="4"/>
    <circle cx="172" cy="306" r="32" fill="#0f2b58" stroke="#ffd86c" stroke-width="4"/>
    <circle cx="462" cy="300" r="32" fill="#0f2b58" stroke="#c48bff" stroke-width="4"/>
  </g>
  <g font-family="Outfit, Arial, sans-serif" font-weight="900" fill="#ffffff" text-anchor="middle">
    <text x="320" y="216" font-size="18">RECALL</text>
    <text x="170" y="132" font-size="15">TERM</text>
    <text x="470" y="132" font-size="15">KEY</text>
    <text x="172" y="312" font-size="15">CUE</text>
    <text x="462" y="306" font-size="15">LOCK</text>
  </g>
</svg>
