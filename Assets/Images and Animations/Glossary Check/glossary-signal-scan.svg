    <circle cx="320" cy="210" r="132" fill="none" stroke="#62f0ff" stroke-width="2" opacity=".45"/>
    <circle cx="320" cy="210" r="166" fill="none" stroke="#72f7b8" stroke-width="1" opacity=".28"/>
    <path d="M320 114v192M224 210h192" stroke="#ffd86c" stroke-width="4" stroke-linecap="round" opacity=".8"/>
    <circle cx="320" cy="210" r="20" fill="#ffd86c"/>
  </g>
  <g font-family="Outfit, Arial, sans-serif" font-weight="800" font-size="20" fill="#dffcff">
