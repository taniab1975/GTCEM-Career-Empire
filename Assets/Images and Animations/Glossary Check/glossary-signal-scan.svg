<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Glossary signal scan chamber</title>
  <desc id="desc">A glowing sci-fi scanner ring with floating glossary tokens.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="46%" r="66%">
      <stop offset="0" stop-color="#163e6d"/>
      <stop offset="0.55" stop-color="#0b1837"/>
      <stop offset="1" stop-color="#050916"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#62f0ff"/>
      <stop offset="1" stop-color="#72f7b8"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="420" rx="42" fill="url(#bg)"/>
  <path d="M64 70h512v280H64z" fill="none" stroke="#223b78" stroke-width="2"/>
  <path d="M94 98h452v224H94z" fill="none" stroke="#295399" stroke-width="1" opacity=".72"/>
