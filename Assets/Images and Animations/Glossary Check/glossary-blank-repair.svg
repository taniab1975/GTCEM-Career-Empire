<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Glossary blank repair chamber</title>
  <desc id="desc">A definition panel with a glowing blank ready to be repaired.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101c46"/>
      <stop offset=".55" stop-color="#0a1534"/>
      <stop offset="1" stop-color="#050815"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd86c"/>
      <stop offset="1" stop-color="#72f7b8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="420" rx="42" fill="url(#bg)"/>
  <g opacity=".22" stroke="#62f0ff" stroke-width="1">
    <path d="M76 86h488M76 334h488M96 62v296M544 62v296"/>
    <path d="M130 102l54 216M510 102l-54 216"/>
  </g>
  <g filter="url(#glow)">
    <rect x="112" y="104" width="416" height="212" rx="28" fill="#0f234e" stroke="#62f0ff" stroke-width="3"/>
    <path d="M154 158h244M154 202h330M154 246h122" stroke="#dffcff" stroke-width="14" stroke-linecap="round" opacity=".82"/>
    <path d="M306 246h180" stroke="url(#gold)" stroke-width="14" stroke-linecap="round"/>
    <path d="M306 278h180" stroke="#ffd86c" stroke-width="3" stroke-dasharray="12 10" stroke-linecap="round"/>
  </g>
  <g fill="#ffd86c" opacity=".9">
    <circle cx="306" cy="278" r="5"/>
    <circle cx="370" cy="278" r="5"/>
    <circle cx="434" cy="278" r="5"/>
  </g>
  <g font-family="Outfit, Arial, sans-serif" font-weight="800" fill="#ffffff">
    <text x="144" y="80" font-size="20" opacity=".8">DEFINITION REPAIR</text>
    <text x="322" y="259" font-size="28">KEYWORD</text>
  </g>
</svg>
