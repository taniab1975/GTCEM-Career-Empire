<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Glossary space runner scene</title>
  <desc id="desc">A futuristic space vault tunnel with glowing lanes, stars and term gates.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071227"/>
      <stop offset="0.45" stop-color="#12245c"/>
      <stop offset="1" stop-color="#070b1a"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="52%" r="55%">
      <stop offset="0" stop-color="#61f0ff" stop-opacity="0.42"/>
      <stop offset="0.38" stop-color="#6857ff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#050a16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lane" x1="0" x2="1">
